<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Процедурный генератор баннеров</title>
    <meta
        content="Клиентский генератор стилизованных баннеров для превью стримов: 3D-заголовок, рваная плашка, процедурный гранж по seed. Весь рендер в браузере, без серверов."
        name="description" />
    <base href="/" />

    <meta content="website" property="og:type" />
    <meta content="Процедурный генератор баннеров" property="og:title" />
    <meta
        content="Обложка для видео за пару кликов: 3D-заголовок, рваная плашка, гранж по seed. Рендер в браузере на Blazor + SkiaSharp, без серверов."
        property="og:description" />
    <meta content="https://thevsakeeper.github.io/procedural-banner-generator/" property="og:url" />
    <meta content="https://thevsakeeper.github.io/procedural-banner-generator/icon-512.png" property="og:image" />
    <meta content="summary" name="twitter:card" />
    <link id="webassembly" rel="preload" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=Saira+Condensed:wght@400;500;600;700&family=Chakra+Petch:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="ProceduralBannerGenerator.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link href="favicon.png" rel="icon" type="image/png" />
    <link href="icon-512.png" rel="apple-touch-icon" sizes="512x512" />
    <link href="icon-192.png" rel="apple-touch-icon" sizes="192x192" />
    <meta content="#b6d426" name="theme-color" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle cx="50%" cy="50%" r="40%" />
            <circle cx="50%" cy="50%" r="40%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Произошла непредвиденная ошибка.
        <a class="reload" href=".">Перезагрузить</a>
        <span aria-hidden="true" class="dismiss" title="Закрыть">
            <svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                 stroke-width="2"
                 viewBox="0 0 24 24" width="16">
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
            </svg>
        </span>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Мост к Telegram Mini App: available() — открыты ли внутри Telegram; send() — отдать данные боту и закрыть.
        window.tgWebApp = {
            available: function () { return !!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== undefined); },
            send: function (json) { window.Telegram.WebApp.sendData(json); window.Telegram.WebApp.close(); }
        };
        if (window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', {updateViaCache: 'none'});</script>
</body>

</html>
