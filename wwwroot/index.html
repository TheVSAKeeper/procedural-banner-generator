<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Процедурный генератор баннеров</title>
    <base href="/" />
    <link id="webassembly" rel="preload" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=Saira+Condensed:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="ProceduralBannerGenerator.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link href="icon-512.png" rel="apple-touch-icon" sizes="512x512" />
    <link href="icon-192.png" rel="apple-touch-icon" sizes="192x192" />
    <meta content="#b6d426" name="theme-color" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle cx="50%" cy="50%" r="40%" />
            <circle cx="50%" cy="50%" r="40%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a class="reload" href=".">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', {updateViaCache: 'none'});</script>
</body>

</html>
